version: 1
applications:
  - appRoot: aws_port/aws_port
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
    redirects:
      - source: </^[^.]+$|.(?!(css|gif|ico|jpg|jpeg|js|png|svg|txt|webp|map)$)([^.]+$)/>
        target: /index.html
        status: 200
